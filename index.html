    <script>
        // ============================================================
        // OPTIMASI UNTUK LOCALHOST
        // ============================================================
        (function() {
            const isLocal = false;
            window.__isLocal = isLocal;

            if (isLocal) {
                console.log('🔧 Running in LOCALHOST mode - Socket.io disabled');
                window.__mockSocket = {
                    on: () => {},
                    emit: () => {},
                    disconnect: () => {},
                    connected: false
                };
                window.io = function() { return window.__mockSocket; };
            }

            let __frameSkip = 0;
            const __origRequestAnimationFrame = window.requestAnimationFrame;
            
            window.__throttledRAF = function(callback) {
                __frameSkip++;
                if (__frameSkip % 2 === 0 || !isLocal) {
                    return __origRequestAnimationFrame(callback);
                } else {
                    return setTimeout(callback, 16);
                }
            };

            window.addEventListener('beforeunload', function() {
                if (window.__socket && window.__socket.disconnect) {
                    window.__socket.disconnect();
                }
            });

            console.log('✅ Load optimized for', isLocal ? 'LOCALHOST' : 'PRODUCTION');
        })();
        // ============================================================

        // ============================================================
        // AVATAR IMAGE CACHE
        // ============================================================
        const avatarImageCache = {};

        function loadAvatarImage(username, avatarPath) {
            if (!avatarPath) return;
            
            const cleanUser = username.startsWith('@') ? username.substring(1) : username;
            
            if (avatarImageCache[cleanUser]) return;
            
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = function() {
                console.log(`✅ Avatar loaded: ${cleanUser}`);
                avatarImageCache[cleanUser] = img;
            };
            img.onerror = function() {
                console.log(`⚠️ Failed to load avatar: ${cleanUser}`);
            };
            img.src = avatarPath;
        }

        // ============================================================
        // MAIN GAME CODE
        // ============================================================
        (function() {
            const isLocal = window.__isLocal || false;
            
            const gameWrapper = document.getElementById('gameWrapper');
            
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const gameoverOverlay = document.getElementById('gameoverOverlay');
            const playAgainBtn = document.getElementById('playAgainBtn');
            
            const powerIndicator = document.getElementById('powerIndicator');
            const powerEmoji = document.getElementById('powerEmoji');
            const powerTimerText = document.getElementById('powerTimerText');
            const powerProgress = document.getElementById('powerProgress');

            const likePercentText = document.getElementById('likePercentText');
            const likeFillMiniBar = document.getElementById('likeFillMiniBar');

            const STORAGE_KEY = 'plinkoKidsScore';
            const BEST_KEY = 'plinkoKidsBest';

            const CONFIG = {
                gravity: 0.2,
                friction: 0.5,
                rows: 10,
                cols: 9,
                pegRadius: 7,
                chipRadius: 11,
                monsterRadius: 20,
                monsterSpeed: 0.18,
                powerUpDuration: 15,
                monsterDestroyDuration: 5,
                slots: [
                    { color: '#ffa5a5', val: 10, emoji: '🍎' },
                    { color: '#ffc896', val: 20, emoji: '🍊' },
                    { color: '#fafa9b', val: 50, emoji: '🍋' },
                    { color: '#b8e0b8', val: 20, emoji: '🍏' },
                    { color: '#b1d1fc', val: 10, emoji: '🫐' }
                ]
            };
            const SLOT_COUNT = 5;
            const SLOT_WIDTH = canvas.width / SLOT_COUNT;

            let score = 0;
            let bestScore = 0;
            let gameActive = true;
            let gamePaused = false;
            let soundEnabled = true;
            
            let activePowerUps = {
                '2x': false,
                'shield': false,
                'shoot': false
            };
            let powerUpTimer = null;
            let powerUpStartTime = 0;
            let powerUps = [];
            
            let monsterDestroyed = false;
            let monsterDestroyTimer = null;
            
            // ===== GIFT STACK SYSTEM =====
            const giftOwners = {
                rose: new Set(),
                donut: new Set(),
                donat: new Set(),
                fingerheart: new Set()
            };
            
            const giftData = {
                rose: {},
                donut: {},
                donat: {},
                fingerheart: {}
            };
            
            let roseCount = 0;
            let donutCount = 0;
            let fingerheartCount = 0;

            try {
                const savedScore = localStorage.getItem(STORAGE_KEY);
                if (savedScore !== null) score = parseInt(savedScore, 10) || 0;
                
                const savedBest = localStorage.getItem(BEST_KEY);
                if (savedBest !== null) bestScore = parseInt(savedBest, 10) || 0;
                else bestScore = score;
            } catch (e) { console.log('localStorage error'); }

            bestScore = Math.max(bestScore, score);
            
            let balloons = []; 
            let activeViewers = new Set();
            let particles = [];
            let playerScores = {};
            let highScore24 = { username: '', avatar: '😺', avatarPath: '', score: 0, timestamp: Date.now() };
            
            // Leaderboard
            let leaderboard = [];
            
            // ===== LOAD HIGHSCORE FROM SERVER =====
            function loadHighScoreFromServer() {
                if (!isLocal) {
                    fetch('/api/highscore')
                        .then(r => r.json())
                        .then(data => { 
                            if (data && data.score > 0) {
                                highScore24 = data; 
                                console.log('🏆 Highscore loaded from server:', data);
                            }
                        })
                        .catch(() => console.log('⚠️ Failed to load highscore from server'));
                    
                    fetch('/api/leaderboard')
                        .then(r => r.json())
                        .then(data => {
                            if (data && data.length > 0) {
                                leaderboard = data;
                                console.log('🏆 Leaderboard loaded:', leaderboard.length, 'entries');
                                updateLeaderboardUI();
                            }
                        })
                        .catch(() => console.log('⚠️ Failed to load leaderboard'));
                }
            }
            
            // ===== SAVE HIGHSCORE TO SERVER =====
            function saveHighScoreToServer(username, avatar, avatarPath, score) {
                if (!isLocal && username && score > 0) {
                    fetch('/api/highscore', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, avatar, avatarPath, score })
                    })
                    .then(r => r.json())
                    .then(data => {
                        if (data.isNewRecord) {
                            console.log('🎉 New highscore record saved to server!');
                        }
                    })
                    .catch(() => console.log('⚠️ Failed to save highscore to server'));
                }
            }
            
            // ===== SAVE GAME STATS TO SERVER =====
            function saveGameStatsToServer() {
                if (!isLocal) {
                    const stats = {
                        totalLikes: totalLikes || 0,
                        totalGifts: totalGifts || 0,
                        gamesPlayed: gamesPlayed || 0
                    };
                    fetch('/api/stats', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(stats)
                    })
                    .catch(() => console.log('⚠️ Failed to save stats to server'));
                }
            }
            
            // Load highscore from server on start
            loadHighScoreFromServer();
            
            try {
                const hs = localStorage.getItem('highScore24');
                if (hs) {
                    const parsed = JSON.parse(hs);
                    if (parsed.score > highScore24.score) {
                        highScore24 = parsed;
                    }
                }
            } catch(e) {}
            
            let likeCount = 0;
            let likeTarget = 100;
            let lockedRoundTarget = 100;
            let roundCounter = 0;
            let totalLikes = 0;
            let totalGifts = 0;
            let gamesPlayed = 0;

            function updateGiftDisplay() {
                document.getElementById('roseCountDisplay').textContent = roseCount;
                document.getElementById('donutCountDisplay').textContent = donutCount;
                document.getElementById('fingerheartCountDisplay').textContent = fingerheartCount;
            }

            
            function normalizeGiftUser(username){
                return username && username.startsWith('@')
                    ? username
                    : '@' + username;
            }


            // ===== FUNGSI SHIELD & X2 =====
            function hasShield(username) {
                username = normalizeGiftUser(username);
                if (giftOwners.rose.has(username)) {
                    const data = giftData.rose[username];
                    if (data && data.endTime && data.endTime > Date.now()) {
                        return true;
                    }
                }
                if (giftOwners.donut.has(username)) {
                    const data = giftData.donut[username];
                    if (data && data.rounds > 0) {
                        return true;
                    }
                }
                if (giftOwners.donat.has(username)) {
                    const data = giftData.donat[username];
                    if (data && data.rounds > 0) {
                        return true;
                    }
                }
                return false;
            }

            function hasX2(username) {
                username = normalizeGiftUser(username);
                if (giftOwners.fingerheart.has(username)) {
                    const data = giftData.fingerheart[username];
                    if (data && data.endTime && data.endTime > Date.now()) {
                        return true;
                    }
                }
                return false;
            }

            function getShieldRemaining(username) {
                let maxRemaining = 0;
                
                if (giftOwners.rose.has(username)) {
                    const data = giftData.rose[username];
                    if (data && data.endTime && data.endTime > Date.now()) {
                        const remaining = Math.max(0, Math.ceil((data.endTime - Date.now()) / 1000));
                        if (remaining > maxRemaining) maxRemaining = remaining;
                    }
                }
                
                if (giftOwners.donut.has(username)) {
                    const data = giftData.donut[username];
                    if (data && data.rounds > 0) {
                        const remaining = data.rounds;
                        if (remaining > maxRemaining) maxRemaining = remaining;
                    }
                }
                
                if (giftOwners.donat.has(username)) {
                    const data = giftData.donat[username];
                    if (data && data.rounds > 0) {
                        const remaining = data.rounds;
                        if (remaining > maxRemaining) maxRemaining = remaining;
                    }
                }
                
                return maxRemaining;
            }

            function getX2Remaining(username) {
                if (giftOwners.fingerheart.has(username)) {
                    const data = giftData.fingerheart[username];
                    if (data && data.endTime && data.endTime > Date.now()) {
                        return Math.max(0, Math.ceil((data.endTime - Date.now()) / 1000));
                    }
                }
                return 0;
            }

            function addGift(giftName, username, avatar) {
                username = '@' + username;
                
                switch(giftName) {
                    case 'Rose': {
                        giftOwners.rose.add(username);
                        if (!giftData.rose[username]) {
                            giftData.rose[username] = { endTime: 0 };
                        }
                        const now = Date.now();
                        if (giftData.rose[username].endTime > now) {
                            giftData.rose[username].endTime += 15000;
                        } else {
                            giftData.rose[username].endTime = now + 15000;
                        }
                        roseCount++;
                        totalGifts++;
                        showShieldNotification(`<img src="${avatar}" class="noti-avatar"><img src="assets/gifts/rose.png" class="gift-icon-noti"> Rose Shield +15s (${username})`);
                        break;
                    }
                        
                    case 'Donut': {
                        giftOwners.donut.add(username);
                        if (!giftData.donut[username]) {
                            giftData.donut[username] = { rounds: 0 };
                        }
                        giftData.donut[username].rounds += 2;
                        donutCount++;
                        totalGifts++;
                        showShieldNotification(`<img src="${avatar}" class="noti-avatar"><img src="assets/gifts/donut.png" class="gift-icon-noti"> Donut Shield +2 Games (${username})`);
                        break;
                    }
                        
                    case 'Donat': {
                        giftOwners.donat.add(username);
                        if (!giftData.donat[username]) {
                            giftData.donat[username] = { rounds: 0 };
                        }
                        giftData.donat[username].rounds += 1;
                        totalGifts++;
                        showShieldNotification(`<img src="${avatar}" class="noti-avatar"><img src="assets/gifts/donat.png" class="gift-icon-noti"> Donat Shield +1 Game (${username})`);
                        break;
                    }
                        
                    case 'Finger Heart': {
                        giftOwners.fingerheart.add(username);
                        if (!giftData.fingerheart[username]) {
                            giftData.fingerheart[username] = { endTime: 0 };
                        }
                        const now = Date.now();
                        if (giftData.fingerheart[username].endTime > now) {
                            giftData.fingerheart[username].endTime += 30000;
                        } else {
                            giftData.fingerheart[username].endTime = now + 30000;
                        }
                        fingerheartCount++;
                        totalGifts++;
                        showShieldNotification(`<img src="${avatar}" class="noti-avatar"><img src="assets/gifts/fingerheart.png" class="gift-icon-noti"> X2 Points +30s (${username})`);
                        if (typeof activatePowerUp === 'function') activatePowerUp('2x');
                        break;
                    }
                }
                updateGiftDisplay();
                saveGameStatsToServer();
            }

            function decrementRoundShields() {
                for (const username of giftOwners.donut) {
                    const data = giftData.donut[username];
                    if (data && data.rounds > 0) {
                        data.rounds--;
                        if (data.rounds <= 0) {
                            giftOwners.donut.delete(username);
                            delete giftData.donut[username];
                            donutCount = Math.max(0, donutCount - 1);
                        }
                    }
                }
                
                for (const username of giftOwners.donat) {
                    const data = giftData.donat[username];
                    if (data && data.rounds > 0) {
                        data.rounds--;
                        if (data.rounds <= 0) {
                            giftOwners.donat.delete(username);
                            delete giftData.donat[username];
                        }
                    }
                }
                updateGiftDisplay();
            }

            let roundDefaultSeconds = window.fakeTikTokDuration || 120;
            let monster2Destroyed = false;
            let monster3Destroyed = false;
            let pegs = [];            

            // ========== SOUND ==========
            let audioCtx = null;
            let lastSoundTime = {};

            document.addEventListener('touchstart', enableAudio, { once:true });
            document.addEventListener('click', enableAudio, { once:true });
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden && audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume().catch(()=>{});
                }
            });

            function initAudio() {
                if (audioCtx) return;
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {
                    console.log('Web Audio API not supported');
                }
            }

            function playSound(type) {
                const nowMs = Date.now();
                if (lastSoundTime[type] && nowMs - lastSoundTime[type] < 50) return;
                lastSoundTime[type] = nowMs;
                if (!soundEnabled || !audioCtx) return;
                
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(() => {
                        actuallyPlaySound(type);
                    }).catch(() => {});
                } else {
                    actuallyPlaySound(type);
                }
            }

            function actuallyPlaySound(type) {
                if (!audioCtx) return;
                
                try {
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    
                    switch(type) {
                        case 'drop':
                            osc.frequency.setValueAtTime(400, now);
                            osc.frequency.exponentialRampToValueAtTime(200, now + 0.15);
                            gainNode.gain.setValueAtTime(0.1, now);
                            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                            break;
                        case 'peg':
                            osc.frequency.setValueAtTime(800, now);
                            osc.frequency.exponentialRampToValueAtTime(500, now + 0.1);
                            gainNode.gain.setValueAtTime(0.08, now);
                            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                            break;
                        case 'score':
                            osc.frequency.setValueAtTime(600, now);
                            osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                            gainNode.gain.setValueAtTime(0.15, now);
                            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                            break;
                        case 'monster':
                            osc.frequency.setValueAtTime(150, now);
                            osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                            gainNode.gain.setValueAtTime(0.2, now);
                            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                            break;
                        case 'powerup':
                            osc.frequency.setValueAtTime(900, now);
                            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
                            gainNode.gain.setValueAtTime(0.15, now);
                            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                            break;
                        case 'shoot':
                            osc.frequency.setValueAtTime(1200, now);
                            osc.frequency.exponentialRampToValueAtTime(600, now + 0.08);
                            gainNode.gain.setValueAtTime(0.12, now);
                            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                            break;
                        case 'destroy':
                            osc.frequency.setValueAtTime(200, now);
                            osc.frequency.exponentialRampToValueAtTime(400, now + 0.3);
                            gainNode.gain.setValueAtTime(0.25, now);
                            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                            break;
                        default: break;
                    }
                    
                    osc.start(now);
                    osc.stop(now + 0.5);
                } catch (e) {
                    console.log('Sound error:', e);
                }
            }

            function enableAudio() {
                initAudio();
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume().catch(() => {});
                }
            }

            // ========== POWER UP ==========
            function updatePowerIndicator() {
                if (powerIndicator.style.display === 'none') return;
                
                powerIndicator.classList.remove('active-2x', 'active-shield', 'active-shoot');
                
                if (activePowerUps['2x'] || activePowerUps['shield'] || activePowerUps['shoot']) {
                    if (activePowerUps['2x']) {
                        powerEmoji.textContent = '2️⃣';
                        powerIndicator.classList.add('active-2x');
                    } else if (activePowerUps['shield']) {
                        powerEmoji.textContent = '🛡️';
                        powerIndicator.classList.add('active-shield');
                    } else if (activePowerUps['shoot']) {
                        powerEmoji.textContent = '🔫';
                        powerIndicator.classList.add('active-shoot');
                    }
                    
                    powerProgress.classList.add('active');
                    
                    let elapsed = (Date.now() - powerUpStartTime) / 1000;
                    let remaining = Math.max(0, CONFIG.powerUpDuration - elapsed);
                    powerTimerText.textContent = Math.ceil(remaining);
                } else {
                    powerEmoji.textContent = '⚡';
                    powerTimerText.textContent = '0';
                    powerProgress.classList.remove('active');
                }
            }

            function activatePowerUp(type) {
                activePowerUps[type] = true;
                powerUpStartTime = Date.now();
                
                if (powerUpTimer) {
                    clearTimeout(powerUpTimer);
                }
                
                powerUpTimer = setTimeout(() => {
                    activePowerUps = {
                        '2x': false,
                        'shield': false,
                        'shoot': false
                    };
                    powerUpTimer = null;
                    updatePowerIndicator();
                }, CONFIG.powerUpDuration * 1000);
                
                playSound('powerup');
                updatePowerIndicator();
            }
            
            // ========== MONSTER DESTROY ==========
            function destroyMonster() {
                if (monsterDestroyed) return;
                
                monsterDestroyed = true;
                playSound('destroy');
                lockedTurretTarget=null;
                lockedTurretSide=null;
                
                for (let i=0; i<8; i++) {
                    particles.push(new Particle(monster.x, monster.y, '#ff6b6b'));
                }
                
                if (monsterDestroyTimer) {
                    clearTimeout(monsterDestroyTimer);
                }
                
                monsterDestroyTimer = setTimeout(() => {
                    monsterDestroyed = false;
                    monster.x = canvas.width / 2;
                    monster.y = canvas.height - 100;
                    
                    for (let i=0; i<20; i++) {
                        particles.push(new Particle(monster.x, monster.y, '#9b59b6'));
                    }
                }, 5000);
            }

            // ========== MONSTERS ==========
            let monster2 = {
                x: canvas.width / 2 - 120,
                y: canvas.height - 120,
                radius: CONFIG.monsterRadius,
                color: '#e74c3c',
                eyeColor: 'white',
                pupilColor: '#2c3e50',
                speed: 0.40,
                legOffset: 0,
            };

            let monster3 = {
                x: canvas.width / 2 + 120,
                y: canvas.height - 90,
                radius: CONFIG.monsterRadius,
                color: '#2ecc71',
                eyeColor: 'white',
                pupilColor: '#2c3e50',
                speed: 0.06,
                legOffset: 0,
            };

            let monster = {
                x: canvas.width / 2,
                y: canvas.height - 100,
                radius: CONFIG.monsterRadius,
                color: '#9b59b6',
                eyeColor: 'white',
                pupilColor: '#2c3e50',
                speed: 0.20,
                legOffset: 0,
            };

            // ========== PEGS ==========
            const startY = 80;            
            const rowSpacing = 48;
            const leftMargin = 38;
            const rightMargin = 38;      
            const availableWidth = canvas.width - leftMargin - rightMargin;
            const colSpacing = availableWidth / (CONFIG.cols - 1);
            
            for (let r = 0; r < CONFIG.rows; r++) {
                let offsetX = (r % 2 === 0) ? 0 : colSpacing / 2;
                for (let c = 0; c < CONFIG.cols; c++) {
                    let x = leftMargin + c * colSpacing + offsetX;
                    const maxX = canvas.width - rightMargin;
                    if (x > maxX) x = maxX;
                    if (x < leftMargin) x = leftMargin;
                    
                    let hapus = false;
                    if (r === 1 || r === 3 || r === 5 || r === 7 || r === 9) {
                        if (c === CONFIG.cols - 1) hapus = true;
                    }
                    
                    if (!hapus) {
                        let y = startY + r * rowSpacing + (c % 2) * 1.5; 
                        pegs.push({
                            x: x, y: y,
                            baseR: CONFIG.pegRadius,
                            currentR: CONFIG.pegRadius,
                            color: `hsl(${ (r * 35 + c * 25) % 360 }, 75%, 72%)`,
                        });
                    }
                }
            }

            // ========== PARTICLE ==========
            class Particle {
                constructor(x, y, baseColor) {
                    this.x = x; this.y = y;
                    this.vx = (Math.random() - 0.5) * 3;
                    this.vy = (Math.random() - 0.8) * 3;
                    this.life = 1.0;
                    this.color = baseColor || '#ffdb8a';
                    this.size = Math.random() * 5 + 2;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.02;
                    this.life -= 0.018;
                }
                draw() {
                    ctx.globalAlpha = this.life;
                    ctx.fillStyle = this.color;
                    ctx.fillRect(this.x-2, this.y-2, this.size, this.size);
                    ctx.globalAlpha = 1;
                }
            }

            // ========== BALLOON ==========
            class Balloon {
                constructor(x) {
                    this.x = Math.min(Math.max(x, 30), canvas.width - 30);
                    this.y = 30;
                    this.vx = (Math.random() - 0.5) * 1.6;
                    this.vy = 0.8;
                    this.dead = false;
                    this.radius = CONFIG.chipRadius;
                    this.color = `hsl(${Math.random() * 360}, 80%, 70%)`;
                    this.tail = [];
                    this.stuckCounter = 0;
                    this.lastY = this.y;
                    this.lastPegHitTime = 0;
                    this.username = '';
                    this.cleanUsername = '';
                    this.avatarColor = 'hsl(' + Math.floor(Math.random()*360) + ',70%,60%)';
                    this.isBot = false;
                    this.avatarPath = '';
                }

                update() {
                    if (!gameActive || gamePaused) return;
                    
                    const cleanUser = this.cleanUsername || this.username.replace('@', '');
                    if (!activeViewers.has(cleanUser)) {
                        this.dead = true;
                        return;
                    }
                    
                    this.tail.push({x: this.x, y: this.y});
                    if (this.tail.length > 5) this.tail.shift();
                    this.lastY = this.y;

                    this.vy += CONFIG.gravity;
                    this.x += this.vx;
                    this.y += this.vy;

                    if (this.x < 15 + this.radius) {
                        this.x = 15 + this.radius;
                        this.vx *= -CONFIG.friction;
                        for (let i=0; i<2; i++) particles.push(new Particle(this.x, this.y, '#ffdb8a'));
                    }
                    if (this.x > canvas.width - 15 - this.radius) {
                        this.x = canvas.width - 15 - this.radius;
                        this.vx *= -CONFIG.friction;
                        for (let i=0; i<2; i++) particles.push(new Particle(this.x, this.y, '#ffdb8a'));
                    }

                    pegs.forEach(p => {
                        let dx = this.x - p.x;
                        let dy = this.y - p.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        let minDist = this.radius + p.currentR;
                        if (dist < minDist) {
                            p.currentR = p.baseR * 2.0;
                            let angle = Math.atan2(dy, dx);
                            let overlap = minDist - dist;
                            this.x += Math.cos(angle) * overlap * 0.8;
                            this.y += Math.sin(angle) * overlap * 0.8;
                            this.vx += Math.cos(angle) * 3.0;
                            this.vy += Math.sin(angle) * 3.0;
                            this.vx *= 0.75;
                            this.vy *= 0.75;
                            for (let i=0; i<3; i++) particles.push(new Particle(p.x, p.y, p.color));
                            
                            let now = Date.now();
                            if (now - this.lastPegHitTime > 100) {
                                if (soundEnabled) playSound('peg');
                                this.lastPegHitTime = now;
                            }
                        }
                    });

                    const hasShieldActive = hasShield(this.username);
                    
                    // ===== KENA MONSTER 1 =====
                    if (!monsterDestroyed) {
                        let dx = this.x - monster.x;
                        let dy = this.y - monster.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if (dist < this.radius + monster.radius) {
                            if (hasShieldActive) {
                                let angle = Math.atan2(dy, dx);
                                this.x += Math.cos(angle) * 20;
                                this.y += Math.sin(angle) * 20;
                                monster.x -= Math.cos(angle) * 15;
                                monster.y -= Math.sin(angle) * 15;
                                for (let i=0; i<10; i++) {
                                    particles.push(new Particle(this.x, this.y, '#87ceeb'));
                                }
                            } else {
                                // KENA MONSTER TANPA SHIELD
                                if (soundEnabled) playSound('monster');
                                
                                // ===== CHECK: Viewer masih aktif? =====
                                this.dead = true;
                                activeViewers.delete(cleanUser);

                                if (window.__socket) {
                                    window.__socket.emit('balloon_removed', { user: cleanUser });
                                }

                                if (false) {
                                } else {
                                    this.dead = true;
                                    console.log(`👤 Balloon removed (viewer left, monster): ${this.username}`);
                                    if (window.__socket) {
                                        window.__socket.emit('balloon_removed', { user: this.username });
                                    }
                                }
                                return;
                            }
                        }
                    }

                    // ===== KENA MONSTER 2 =====
                    if (!monster2Destroyed) {
                        let dx2 = this.x - monster2.x;
                        let dy2 = this.y - monster2.y;
                        let dist2 = Math.sqrt(dx2*dx2 + dy2*dy2);
                        if (dist2 < this.radius + monster2.radius) {
                            if (hasShieldActive) {
                                let angle = Math.atan2(dy2, dx2);
                                this.x += Math.cos(angle) * 20;
                                this.y += Math.sin(angle) * 20;
                                monster2.x -= Math.cos(angle) * 15;
                                monster2.y -= Math.sin(angle) * 15;
                                for(let i=0; i<10; i++) { 
                                    particles.push(new Particle(this.x, this.y, '#FFD700')); 
                                }
                            } else {
                                // KENA MONSTER 2 TANPA SHIELD
                                if (soundEnabled) playSound('monster');
                                
                                // ===== CHECK: Viewer masih aktif? =====
                                this.dead = true;
                                activeViewers.delete(cleanUser);

                                if (window.__socket) {
                                    window.__socket.emit('balloon_removed', { user: cleanUser });
                                }

                                if (false) {
                                } else {
                                    this.dead = true;
                                    console.log(`👤 Balloon removed (viewer left, monster2): ${this.username}`);
                                    if (window.__socket) {
                                        window.__socket.emit('balloon_removed', { user: this.username });
                                    }
                                }
                                return;
                            }
                        }
                    }

                    // ===== KENA MONSTER 3 =====
                    if (!monster3Destroyed) {
                        let dx3 = this.x - monster3.x;
                        let dy3 = this.y - monster3.y;
                        let dist3 = Math.sqrt(dx3*dx3 + dy3*dy3);
                        if (dist3 < this.radius + monster3.radius) {
                            if (hasShieldActive) {
                                let angle = Math.atan2(dy3, dx3);
                                this.x += Math.cos(angle) * 20;
                                this.y += Math.sin(angle) * 20;
                                monster3.x -= Math.cos(angle) * 15;
                                monster3.y -= Math.sin(angle) * 15;
                                for(let i=0; i<10; i++) { 
                                    particles.push(new Particle(this.x, this.y, '#FFD700')); 
                                }
                            } else {
                                // KENA MONSTER 3 TANPA SHIELD
                                if (soundEnabled) playSound('monster');
                                
                                // ===== CHECK: Viewer masih aktif? =====
                                this.dead = true;
                                activeViewers.delete(cleanUser);

                                if (window.__socket) {
                                    window.__socket.emit('balloon_removed', { user: cleanUser });
                                }

                                if (false) {
                                } else {
                                    this.dead = true;
                                    console.log(`👤 Balloon removed (viewer left, monster3): ${this.username}`);
                                    if (window.__socket) {
                                        window.__socket.emit('balloon_removed', { user: this.username });
                                    }
                                }
                                return;
                            }
                        }
                    }

                    // ===== SHOOT POWERUP =====
                    if (activePowerUps['shoot'] && !monsterDestroyed) {
                        let dx = this.x - monster.x;
                        let dy = this.y - monster.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if (dist < 150) {
                            ctx.save();
                            ctx.strokeStyle = '#ff6b6b';
                            ctx.lineWidth = 3;
                            ctx.shadowBlur = 10;
                            ctx.shadowColor = '#ff0000';
                            ctx.beginPath();
                            ctx.moveTo(this.x, this.y);
                            ctx.lineTo(monster.x, monster.y);
                            ctx.stroke();
                            ctx.restore();
                            
                            destroyMonster();
                            
                            for (let i=0; i<10; i++) {
                                let p = new Particle(monster.x, monster.y, '#ff6b6b');
                                p.vx = (Math.random() - 0.5) * 5;
                                p.vy = (Math.random() - 0.5) * 5;
                                particles.push(p);
                            }
                        }
                    }

                    // ===== JATUH KE SLOT =====
                    if (this.y > canvas.height - 50) {
                        if (!activeViewers.has(cleanUser)) {
                            this.dead = true;
                            return;
                        }
                        
                        let slotIndex = Math.floor(this.x / SLOT_WIDTH);
                        if (slotIndex >= SLOT_COUNT) slotIndex = SLOT_COUNT - 1;
                        if (slotIndex < 0) slotIndex = 0;
                        let reward = CONFIG.slots[slotIndex].val;
                        
                        if (hasX2(this.username)) {
                            reward *= 2;
                        }
                        
                        score += reward;
                        playerScores[this.username] = (playerScores[this.username] || 0) + reward;
                        const pNow = playerScores[this.username];
                        
                        const avatars = ['😺','😸','😻','🐱','🐯','🦊','🐻','🐼'];
                        const curAvatar = avatars[Math.abs(this.username.length) % avatars.length];
                        const avatarPath = this.avatarPath || '';
                        
                        if(pNow > highScore24.score){
                            highScore24 = {
                                username: this.username,
                                avatar: curAvatar,
                                avatarPath: avatarPath,
                                score: pNow,
                                timestamp: Date.now()
                            };
                            try {
                                localStorage.setItem('highScore24', JSON.stringify(highScore24));
                            } catch(e) {}
                            saveHighScoreToServer(this.username, curAvatar, avatarPath, pNow);
                        }
                        
                        // Update leaderboard via API
                        fetch('/api/highscore', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                username: this.username, 
                                avatar: curAvatar, 
                                avatarPath: avatarPath,
                                score: pNow 
                            })
                        })
                        .then(r => r.json())
                        .then(data => {
                            if (data.highScore) {
                                fetch('/api/leaderboard')
                                    .then(r => r.json())
                                    .then(lb => {
                                        leaderboard = lb;
                                        updateLeaderboardUI();
                                    })
                                    .catch(() => {});
                            }
                        })
                        .catch(() => {});
                        
                        if (soundEnabled) playSound('score');

                        try {
                            localStorage.setItem(STORAGE_KEY, score.toString());
                            if (score > bestScore) {
                                bestScore = score;
                                localStorage.setItem(BEST_KEY, bestScore.toString());
                            } else {
                                localStorage.setItem(BEST_KEY, bestScore.toString());
                            }
                        } catch (e) {}

                        for (let i=0; i<14; i++) {
                            particles.push(new Particle(this.x, canvas.height-40, '#ffe087'));
                        }

                        // ===== CHECK: Viewer masih aktif? =====
                        if (activeViewers.has(cleanUser)) {
                            // Viewer masih ada → spawn balik ke atas
                            this.x = Math.random() * (canvas.width - 60) + 30;
                            this.y = 30;
                            this.vx = (Math.random() - 0.5) * 1.6;
                            this.vy = 0.8;
                        } else {
                            // Viewer dah leave → balloon hilang terus
                            this.dead = true;
                            console.log(`👤 Balloon removed (viewer left, drop): ${this.username}`);
                            if (window.__socket) {
                                window.__socket.emit('balloon_removed', { user: this.username });
                            }
                        }
                        return;
                    }
                }

                draw() {
                    for (let i=0; i<this.tail.length; i++) {
                        ctx.globalAlpha = 0.3 * (i/this.tail.length);
                        ctx.beginPath();
                        ctx.arc(this.tail[i].x, this.tail[i].y, this.radius * 0.7, 0, Math.PI*2);
                        ctx.fillStyle = this.color;
                        ctx.fill();
                    }
                    
                    ctx.globalAlpha = 1;

                    ctx.font = 'bold 11px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'alphabetic';
                    ctx.fillStyle = '#111';
                    ctx.fillText(this.username, this.x, this.y - 32);

                    let topScorer = null;
                    let topScore = 0;
                    for (const [user, sc] of Object.entries(playerScores)) {
                        if (sc > topScore) {
                            topScore = sc;
                            topScorer = user;
                        }
                    }
                    if (topScorer === this.username && topScore > 0) {
                        ctx.font = '24px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'alphabetic';
                        ctx.fillText('👑', this.x, this.y - 44);
                    }

                    const hasDonut = giftOwners.donut.has(this.username) && giftData.donut[this.username] && giftData.donut[this.username].rounds > 0;
                    const hasRose = giftOwners.rose.has(this.username) && giftData.rose[this.username] && giftData.rose[this.username].endTime > Date.now();

                    const avatarY = this.y + 6;
                    const avatarRadius = 16;

                    ctx.save();
                    
                    if (hasDonut) {
                        const pulse = Math.sin(Date.now() / 300) * 0.3 + 0.7;
                        ctx.shadowBlur = 30 + pulse * 25;
                        ctx.shadowColor = `rgba(255, 215, 0, ${0.5 + pulse * 0.4})`;
                    }

                    ctx.beginPath();
                    ctx.arc(this.x, avatarY, avatarRadius, 0, Math.PI * 2);
                    ctx.clip();
                    
                    const avatarKey = this.cleanUsername || this.username.replace('@', '');
                    const cachedImg = avatarImageCache[avatarKey];
                    
                    if (cachedImg && cachedImg.complete && cachedImg.naturalWidth > 0) {
                        ctx.drawImage(
                            cachedImg,
                            this.x - avatarRadius,
                            avatarY - avatarRadius,
                            avatarRadius * 2,
                            avatarRadius * 2
                        );
                    } else {
                        ctx.fillStyle = '#1a1a2e';
                        ctx.fillRect(this.x - avatarRadius, avatarY - avatarRadius, avatarRadius * 2, avatarRadius * 2);
                        ctx.restore();
                        
                        ctx.save();
                        const av = ['😺','😸','😻','🐱','🐯','🦊','🐻','🐼'];
                        ctx.font = '22px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(av[Math.abs(this.username.length) % av.length], this.x, avatarY + 1);
                        ctx.restore();
                        
                        this.drawIconsAndScore(avatarY);
                        return;
                    }
                    
                    ctx.restore();

                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(this.x, avatarY, avatarRadius, 0, Math.PI * 2);
                    if (hasDonut) {
                        ctx.strokeStyle = '#ffd700';
                        ctx.lineWidth = 3;
                    } else if (hasRose) {
                        ctx.strokeStyle = '#00ccff';
                        ctx.lineWidth = 3;
                    } else {
                        ctx.strokeStyle = '#666';
                        ctx.lineWidth = 2;
                    }
                    ctx.stroke();
                    ctx.restore();

                    this.drawIconsAndScore(avatarY);
                }

                drawIconsAndScore(avatarY) {
                    const baris1Y = this.y - 20;

                    if (hasShield(this.username)) {
                        const remaining = getShieldRemaining(this.username);
                        const displayText = remaining > 0 ? remaining : '';
                        
                        ctx.save();
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = 'rgba(0, 204, 102, 0.5)';
                        ctx.beginPath();
                        ctx.arc(this.x - 22, baris1Y + 2, 12, 0, Math.PI * 2);
                        ctx.fillStyle = '#0a2a1a';
                        ctx.fill();
                        ctx.strokeStyle = '#00cc66';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        ctx.restore();
                        
                        ctx.textAlign = 'center';
                        ctx.fillStyle = '#00ff88';
                        ctx.font = 'bold 12px Arial';
                        ctx.textBaseline = 'middle';
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = 'rgba(0, 255, 136, 0.3)';
                        ctx.fillText(displayText, this.x - 22, baris1Y + 3);
                        ctx.shadowBlur = 0;
                    }

                    if (hasShield(this.username)) {
                        ctx.textAlign = 'center';
                        ctx.font = '20px Arial';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('🛡️', this.x + 14, baris1Y + 2);
                    }

                    const baris2Y = this.y + 30;

                    if (hasX2(this.username)) {
                        const remaining = getX2Remaining(this.username);
                        const displayText = remaining > 0 ? remaining : '';
                        
                        ctx.save();
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = 'rgba(255, 215, 0, 0.5)';
                        ctx.beginPath();
                        ctx.arc(this.x - 22, baris2Y + 2, 12, 0, Math.PI * 2);
                        ctx.fillStyle = '#1a1a3e';
                        ctx.fill();
                        ctx.strokeStyle = '#ffd700';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        ctx.restore();
                        
                        ctx.textAlign = 'center';
                        ctx.fillStyle = '#ffd700';
                        ctx.font = 'bold 12px Arial';
                        ctx.textBaseline = 'middle';
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = 'rgba(255, 215, 0, 0.3)';
                        ctx.fillText(displayText, this.x - 22, baris2Y + 3);
                        ctx.shadowBlur = 0;
                    }

                    if (hasX2(this.username)) {
                        ctx.textAlign = 'center';
                        ctx.font = 'bold 20px Arial';
                        ctx.textBaseline = 'middle';
                        ctx.fillStyle = '#000000';
                        ctx.shadowBlur = 5;
                        ctx.shadowColor = 'rgba(0, 0, 0, 0.2)';
                        ctx.fillText('X2', this.x + 14, baris2Y + 2);
                        ctx.shadowBlur = 0;
                    }

                    const pScore = playerScores[this.username] || 0;
                    ctx.textAlign = 'center';
                    ctx.font = 'bold 13px Arial';
                    ctx.fillStyle = '#FFD700';
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 4;
                    ctx.textBaseline = 'middle';
                    ctx.strokeText(pScore, this.x, this.y + 56);
                    ctx.fillText(pScore, this.x, this.y + 56);
                }
            }

            // ========== MONSTER UPDATE ==========
            function updateMonster() {
                if (!gameActive || gamePaused) return;
                
                let nearestBalloon = null;
                let minDist = Infinity;
                
                balloons.forEach(b => {
                    if (!b.dead) {
                        let dx = b.x - monster.x;
                        let dy = b.y - monster.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < minDist) {
                            minDist = dist;
                            nearestBalloon = b;
                        }
                    }
                });

                if (nearestBalloon) {
                    let dx = nearestBalloon.x - monster.x;
                    let dy = nearestBalloon.y - monster.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if (dist > 1) {
                        let moveX = (dx / dist) * monster.speed;
                        let moveY = (dy / dist) * monster.speed;
                        monster.x += moveX;
                        monster.y += moveY;
                    }
                } else {
                    monster.x += (Math.random() - 0.5) * 0.1;
                    monster.y += (Math.random() - 0.5) * 0.1;
                }

                monster.x = Math.max(monster.radius + 10, Math.min(canvas.width - monster.radius - 10, monster.x));
                monster.y = Math.max(monster.radius + 10, Math.min(canvas.height - monster.radius - 10, monster.y));
                monster.legOffset = (monster.legOffset + 0.1) % (Math.PI * 2);

                let farthestBalloon = null;
                let maxDist = 0;

                balloons.forEach(b => {
                  if (!b.dead) {
                    let dx = b.x - monster2.x;
                    let dy = b.y - monster2.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);

                    if (dist > maxDist) {
                      maxDist = dist;
                      farthestBalloon = b;
                    }
                  }
                });

                if(farthestBalloon){
                  let dx=farthestBalloon.x-monster2.x;
                  let dy=farthestBalloon.y-monster2.y;
                  let dist=Math.sqrt(dx*dx+dy*dy);

                  if(dist>1){
                    monster2.x += (dx/dist)*monster2.speed;
                    monster2.y += (dy/dist)*monster2.speed;
                  }
                }
                monster2.legOffset=(monster2.legOffset+0.1)%(Math.PI*2);

                let bottomTarget=null;
                let lowestY=0;

                balloons.forEach(b=>{
                    if(!b.dead && b.y > lowestY){
                        lowestY=b.y;
                        bottomTarget=b;
                    }
                });

                if(bottomTarget){
                    let dx=bottomTarget.x-monster3.x;
                    let dy=bottomTarget.y-monster3.y;
                    let dist=Math.sqrt(dx*dx+dy*dy);

                    if(dist>1){
                        monster3.x += (dx/dist)*monster3.speed;
                        monster3.y += (dy/dist)*monster3.speed;
                    }
                }

                monster3.legOffset=(monster3.legOffset+0.1)%(Math.PI*2);
            }

            // ========== DRAW MONSTER ==========
            function drawMonster(m) {
                if (m === monster && monsterDestroyed) return;
                if (m === monster2 && monster2Destroyed) return;
                if (m === monster3 && monster3Destroyed) return;
                
                ctx.save();
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#6c3483';
                ctx.beginPath();
                ctx.arc(m.x, m.y, m.radius, 0, Math.PI * 2);
                ctx.fillStyle = m.color;
                ctx.fill();
                
                ctx.shadowBlur = 5;
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(m.x - 8, m.y - 6, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(m.x + 8, m.y - 6, 6, 0, Math.PI * 2);
                ctx.fill();
                
                let pupilOffsetX = 0, pupilOffsetY = 0;
                if (balloons.length > 0 && !balloons[0].dead) {
                    let dx = balloons[0].x - m.x;
                    let dy = balloons[0].y - m.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > 0) {
                        pupilOffsetX = (dx / dist) * 3;
                        pupilOffsetY = (dy / dist) * 3;
                    }
                }
                
                ctx.fillStyle = '#2c3e50';
                ctx.beginPath();
                ctx.arc(m.x - 8 + pupilOffsetX, m.y - 6 + pupilOffsetY, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(m.x + 8 + pupilOffsetX, m.y - 6 + pupilOffsetY, 3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(m.x - 10, m.y - 9, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(m.x + 6, m.y - 9, 1.5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.beginPath();
                ctx.strokeStyle = '#4a235a';
                ctx.lineWidth = 3;
                ctx.arc(m.x, m.y + 4, 8, 0.1, Math.PI - 0.1);
                ctx.stroke();
                
                ctx.fillStyle = m.color;
                for (let i = -1; i <= 1; i+=2) {
                    let legX = m.x + i * 10;
                    let legY = m.y + m.radius - 2;
                    let legOffset = Math.sin(m.legOffset + i) * 5;
                    ctx.beginPath();
                    ctx.ellipse(legX, legY + 5, 5, 8 + legOffset, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }

            // ========== TURRET ==========
            const turretLeft = { x: 35, y: canvas.height - 90 };
            const turretRight = { x: canvas.width - 35, y: canvas.height - 90 };
            
            function drawTurret(t, target) {
                ctx.save();
                
                ctx.fillStyle = "#666";
                ctx.beginPath();
                ctx.arc(t.x, t.y, 16, 0, Math.PI * 2);
                ctx.fill();
                
                if (target) {
                    let angle = Math.atan2(target.y - t.y, target.x - t.x);
                    ctx.translate(t.x, t.y);
                    ctx.rotate(angle);
                    
                    ctx.fillStyle = "#222";
                    ctx.fillRect(0, -4, 28, 8);
                    
                    ctx.fillStyle = "#999";
                    ctx.beginPath();
                    ctx.arc(0, 0, 10, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }

            // ========== LASER & CANNON ==========
            let laserBeam = null;
            let cannonBalls = [];

            function getAliveMonsters() {
                const alive = [];
                if (!monsterDestroyed) alive.push({ id: 1, obj: monster });
                if (!monster2Destroyed) alive.push({ id: 2, obj: monster2 });
                if (!monster3Destroyed) alive.push({ id: 3, obj: monster3 });
                return alive;
            }

            window.fireRandomTurret = function() {
                const alive = getAliveMonsters();
                if (!alive.length) return;

                const useLaser = Math.random() < 0.5;
                let target;

                if (useLaser) {
                    playSound('shoot');
                    target = alive.reduce((best, m) => {
                        const d1 = Math.hypot(m.obj.x - turretLeft.x, m.obj.y - turretLeft.y);
                        const d2 = Math.hypot(best.obj.x - turretLeft.x, best.obj.y - turretLeft.y);
                        return d1 > d2 ? m : best;
                    });
                } else {
                    target = alive.reduce((best, m) => {
                        const d1 = Math.hypot(m.obj.x - turretRight.x, m.obj.y - turretRight.y);
                        const d2 = Math.hypot(best.obj.x - turretRight.x, best.obj.y - turretRight.y);
                        return d1 < d2 ? m : best;
                    });
                }

                lockedTurretTarget = target.obj;
                lockedTurretSide = useLaser ? 'left' : 'right';

                if (useLaser) {
                    const laserAngle=Math.atan2(target.obj.y-turretLeft.y,target.obj.x-turretLeft.x);
                    const laserMuzzleX=turretLeft.x+Math.cos(laserAngle)*28;
                    const laserMuzzleY=turretLeft.y+Math.sin(laserAngle)*28;
                    laserBeam = {
                        x1: laserMuzzleX, y1: laserMuzzleY,
                        x2: target.obj.x, y2: target.obj.y,
                        time: 20,
                        targetId: target.id
                    };
                    
                    setTimeout(() => {
                        if (target.id === 1) { 
                            monsterDestroyed = true; 
                            for (let i=0; i<8; i++) particles.push(new Particle(monster.x, monster.y, '#ff6b6b'));
                            setTimeout(() => { 
                                monsterDestroyed = false; 
                                monster.x = canvas.width / 2;
                                monster.y = canvas.height - 100;
                            }, 15000); 
                        }
                        if (target.id === 2) { 
                            monster2Destroyed = true; 
                            for (let i=0; i<8; i++) particles.push(new Particle(monster2.x, monster2.y, '#ff6b6b'));
                            setTimeout(() => { 
                                monster2Destroyed = false; 
                                monster2.x = canvas.width / 2 - 120;
                                monster2.y = canvas.height - 120;
                            }, 15000); 
                        }
                        if (target.id === 3) { 
                            monster3Destroyed = true; 
                            for (let i=0; i<8; i++) particles.push(new Particle(monster3.x, monster3.y, '#ff6b6b'));
                            setTimeout(() => { 
                                monster3Destroyed = false; 
                                monster3.x = canvas.width / 2 + 120;
                                monster3.y = canvas.height - 90;
                            }, 15000); 
                        }
                        playSound('destroy');
                    }, 300);
                } else {
                    playSound('shoot');
                    const angle=Math.atan2(target.obj.y-turretRight.y,target.obj.x-turretRight.x);
                    const muzzleX=turretRight.x+Math.cos(angle)*28;
                    const muzzleY=turretRight.y+Math.sin(angle)*28;
                    cannonBalls.push({
                        x: muzzleX, y: muzzleY,
                        tx: target.obj.x, ty: target.obj.y,
                        angle: angle,
                        targetId: target.id,
                        speed: 6
                    });
                }
            };

            // ========== MAIN LOOP ==========
            function drawScene() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fcf5e6';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (gameActive && !gamePaused) {
                    updateMonster();
                }

                pegs.forEach(p => {
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(Date.now() * 0.002 + p.x * 0.005);
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#ffbb77';
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    for (let i=0; i<5; i++) {
                        let angle = (i * 72) * Math.PI / 180;
                        let sx = Math.cos(angle) * p.currentR * 1.3;
                        let sy = Math.sin(angle) * p.currentR * 1.3;
                        if (i===0) ctx.moveTo(sx, sy);
                        else ctx.lineTo(sx, sy);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                    if (p.currentR > p.baseR) p.currentR -= 0.25;
                });

                drawSlots();

                const alive = getAliveMonsters();
                
                if (alive.length > 0) {
                    let nearest = alive[0];
                    let minDist = Infinity;
                    alive.forEach(m => {
                        let d = Math.hypot(m.obj.x - turretLeft.x, m.obj.y - turretLeft.y);
                        if (d < minDist) { minDist = d; nearest = m; }
                    });
                    drawTurret(turretLeft, (lockedTurretSide==='left' && lockedTurretTarget)?lockedTurretTarget:nearest.obj);
                    
                    let farthest = alive[0];
                    let maxDist = 0;
                    alive.forEach(m => {
                        let d = Math.hypot(m.obj.x - turretRight.x, m.obj.y - turretRight.y);
                        if (d > maxDist) { maxDist = d; farthest = m; }
                    });
                    drawTurret(turretRight, (lockedTurretSide==='right' && lockedTurretTarget)?lockedTurretTarget:farthest.obj);
                } else {
                    drawTurret(turretLeft, {x:canvas.width/2,y:canvas.height/2});
                    drawTurret(turretRight, {x:canvas.width/2,y:canvas.height/2});
                }

                drawMonster(monster);
                drawMonster(monster2);
                drawMonster(monster3);

                particles = particles.filter(p => p.life > 0.02);
                particles.forEach(p => { p.update(); p.draw(); });

                balloons = balloons.filter(b => !b.dead);
                balloons.forEach(b => { b.update(); b.draw(); });

                updatePowerIndicator();

                if (laserBeam) {
                    ctx.save();
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = '#ff0000';
                    ctx.strokeStyle = '#ff2222';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(laserBeam.x1, laserBeam.y1);
                    ctx.lineTo(laserBeam.x2, laserBeam.y2);
                    ctx.stroke();
                    
                    ctx.shadowBlur = 60;
                    ctx.shadowColor = '#ff4444';
                    ctx.strokeStyle = 'rgba(255, 68, 68, 0.3)';
                    ctx.lineWidth = 14;
                    ctx.beginPath();
                    ctx.moveTo(laserBeam.x1, laserBeam.y1);
                    ctx.lineTo(laserBeam.x2, laserBeam.y2);
                    ctx.stroke();
                    ctx.restore();
                    
                    laserBeam.time--;
                    if (laserBeam.time <= 0){ laserBeam = null; lockedTurretTarget=null; lockedTurretSide=null; }
                }

                cannonBalls = cannonBalls.filter(b => {
                    let dx = b.tx - b.x;
                    let dy = b.ty - b.y;
                    let d = Math.hypot(dx, dy);
                    
                    if (d < 10) {
                        if (b.targetId === 1) { 
                            monsterDestroyed = true; 
                            for (let i=0; i<8; i++) particles.push(new Particle(monster.x, monster.y, '#ff6b6b'));
                            setTimeout(() => { 
                                monsterDestroyed = false; 
                                monster.x = canvas.width / 2;
                                monster.y = canvas.height - 100;
                            }, 15000); 
                        }
                        if (b.targetId === 2) { 
                            monster2Destroyed = true; 
                            for (let i=0; i<8; i++) particles.push(new Particle(monster2.x, monster2.y, '#ff6b6b'));
                            setTimeout(() => { 
                                monster2Destroyed = false; 
                                monster2.x = canvas.width / 2 - 120;
                                monster2.y = canvas.height - 120;
                            }, 15000); 
                        }
                        if (b.targetId === 3) { 
                            monster3Destroyed = true; 
                            for (let i=0; i<8; i++) particles.push(new Particle(monster3.x, monster3.y, '#ff6b6b'));
                            setTimeout(() => { 
                                monster3Destroyed = false; 
                                monster3.x = canvas.width / 2 + 120;
                                monster3.y = canvas.height - 90;
                            }, 15000); 
                        }
                        playSound('destroy');
                        
                        for (let i = 0; i < 20; i++) {
                            let p = new Particle(b.x, b.y, '#ff8800');
                            p.vx = (Math.random() - 0.5) * 8;
                            p.vy = (Math.random() - 0.5) * 8;
                            particles.push(p);
                        }
                        return false;
                    }
                    
                    b.x += Math.cos(b.angle) * b.speed;
                    b.y += Math.sin(b.angle) * b.speed;
                    
                    ctx.save();
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#ff8800';
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, 6, 0, Math.PI * 2);
                    ctx.fillStyle = '#ff6600';
                    ctx.fill();
                    
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = '#ffaa00';
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffdd00';
                    ctx.fill();
                    ctx.restore();
                    
                    return true;
                });

                if (window.__throttledRAF) {
                    window.__throttledRAF(drawScene);
                } else {
                    requestAnimationFrame(drawScene);
                }
            }

            drawScene();

socket.on('spawn_user',(d)=>{

 if(exists) return;
 activeViewers.add(user);
 const b=new Balloon(Math.random()*(canvas.width-60)+30);
 b.username='@'+user; b.cleanUsername=user; b.avatarPath=d.avatar||''; balloons.push(b);
 showShieldNotification((d.source==='gift'?'🎁':'❤️')+' @'+user+' entered the game!');
