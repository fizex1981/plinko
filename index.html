<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>👾 Plinko KIDS · Mobile -5% | PC -40% 👾</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        
        body {
            background: linear-gradient(145deg, #c9e9ff 0%, #ffd9f0 100%);
            font-family: 'Quicksand', 'Segoe UI', 'Comic Neue', cursive, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            padding: 0;
        }
        
        .game-wrapper {
            background: #ffc145;
            padding: min(17px, 2.85vw) min(11px, 1.9vw) min(24px, 3.8vw);
            border-radius: min(76px, 9.5vw) min(76px, 9.5vw) min(48px, 5.7vw) min(48px, 5.7vw);
            box-shadow: 0 min(19px, 2.85vw) 0 #b85b2a, 0 min(28px, 3.8vw) min(28px, 3.8vw) rgba(0,0,0,0.25);
            border: min(5.7px, 1.14vw) solid #ffe9a7;
            width: fit-content;
            max-width: 100%;
            max-height: 100vh;
            position: relative;
            opacity: 0;
            transition: opacity 0.8s ease;
            margin: auto;
        }
        .game-wrapper.show {
            opacity: 1;
        }
        
        canvas {
            display: block;
            width: min(95%, 427px);
            height: auto;
            max-height: calc(100vh - min(171px, 23.75vh));
            aspect-ratio: 450 / 650;
            border-radius: min(47.5px, 7.6vw);
            background: #fffbf0;
            box-shadow: inset 0 0 0 min(7.6px, 1.43vw) #fec37f, 0 min(11.4px, 1.9vw) 0 #9f4d26;
            cursor: default;
            touch-action: none;
            margin: 0 auto;
        }
        
        .shield-status-bar{
            background:#1f2937;
            color:#fff;
            padding:12px 20px;
            border-radius:32px;
            border:3px solid #ffd700;
            box-shadow:0 4px 0 #111827;
            font-weight:700;
            font-size:clamp(.72rem,2.2vw,.92rem);
            line-height:1.8;
            text-align:center;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff1cf;
            padding: min(10px, 1.8vw) min(20px, 3.5vw);
            margin: 0 0 min(10px, 1.5vw) 0;
            border-radius: min(60px, 9vw);
            border: min(3.8px, 0.76vw) solid #ffa56e;
            box-shadow: 0 min(8px, 1.4vw) 0 #a05028;
            gap: min(12px, 2vw);
        }

        .like-panel {
            display: flex;
            align-items: center;
            gap: min(10px, 1.8vw);
            background: white;
            padding: min(5px, 0.9vw) min(18px, 3vw);
            border-radius: 40px;
            border: min(3px, 0.6vw) solid #ffad5a;
            box-shadow: inset 0 min(-2px, -0.4vw) 0 #d4944a;
            flex:1; width:100%;
            min-width: 140px;
        }
        .like-panel .like-label {
            font-size: clamp(0.7rem, 3vw, 0.95rem);
            font-weight: 700;
            color: #4d2b13;
            white-space: nowrap;
        }
        .like-panel .like-label .heart {
            color: #ff4757;
        }

        .like-bar-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            margin-top: 2px;
        }

        #likeFillMini {
            width: 55px !important;
            min-width: 55px !important;
            flex: none !important;
            height: 8px !important;
            background: #ddd;
            border: 1px solid #c9a06b;
            border-radius: 999px;
            overflow: hidden;
        }

        #likeFillMiniBar {
            width: 0%;
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #ff2d55 0%, #ff7a00 50%, #ffd400 100%);
            box-shadow: 0 0 14px rgba(255, 170, 0, .8);
            transition: width .25s linear;
        }

        #likePercentText {
            min-width: 20px !important;
            font-size: 11px !important;
            font-weight: 700 !important;
            color: #000 !important;
            text-shadow: none !important;
            margin: 0;
            background: transparent;
            padding: 0;
            border: none;
            display: inline-block;
            white-space: nowrap;
        }

        .timer-box {
            display: flex;
            align-items: center;
            gap: min(5px, 0.8vw);
            background: #ffe582;
            padding: min(5px, 0.9vw) min(14px, 2.5vw);
            border-radius: 40px;
            border: min(3px, 0.6vw) solid #ff8a5c;
            box-shadow: inset 0 min(-2px, -0.4vw) 0 #d47a4a;
            flex-shrink: 0;
        }
        .timer-box span.timer-icon {
            font-size: clamp(1rem, 3.8vw, 1.2rem);
            line-height: 1;
        }
        #roundTimerDisplay {
            background: white;
            border-radius: 30px;
            padding: min(2px, 0.4vw) min(10px, 1.8vw);
            min-width: min(32px, 6vw);
            text-align: center;
            font-weight: 800;
            box-shadow: inset 0 min(-2px, -0.4vw) 0 #d0b07c;
            font-size: clamp(0.85rem, 3.3vw, 1rem);
            line-height: 1.4;
        }

        .power-indicator {
            position: relative;
            width: min(45.6px, 9.5vw);
            height: min(45.6px, 9.5vw);
            min-width: 38px;
            min-height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffd966;
            border-radius: 50%;
            border: min(3.8px, 0.76vw) solid white;
            box-shadow: 0 min(3.8px, 0.76vw) 0 #b45f2e, 0 0 min(14px, 2.85vw) rgba(255, 215, 0, 0.5);
            transition: all 0.3s ease;
            animation: pulseGlow 2s infinite;
        }
        
        @keyframes pulseGlow {
            0% { box-shadow: 0 min(3.8px, 0.76vw) 0 #b45f2e, 0 0 min(9.5px, 1.9vw) rgba(255, 255, 255, 0.5); }
            50% { box-shadow: 0 min(3.8px, 0.76vw) 0 #b45f2e, 0 0 min(19px, 3.8vw) rgba(255, 215, 0, 0.8); }
            100% { box-shadow: 0 min(3.8px, 0.76vw) 0 #b45f2e, 0 0 min(9.5px, 1.9vw) rgba(255, 255, 255, 0.5); }
        }
        
        .power-indicator.active-2x {
            background: linear-gradient(145deg, #ffd700, #ffb347);
            animation: pulseGold 1.5s infinite;
        }
        
        .power-indicator.active-shield {
            background: linear-gradient(145deg, #87ceeb, #4682b4);
            animation: pulseBlue 1.5s infinite;
        }
        
        .power-indicator.active-shoot {
            background: linear-gradient(145deg, #ff6b6b, #ff4757);
            animation: pulseRed 1.5s infinite;
        }
        
        @keyframes pulseGold {
            0% { box-shadow: 0 min(3.8px, 0.76vw) 0 #b45f2e, 0 0 min(14px, 2.85vw) #ffd700; }
            50% { box-shadow: 0 min(3.8px, 0.76vw) 0 #b45f2e, 0 0 min(28px, 5.7vw) #ffd700, 0 0 min(42px, 8.55vw) #ffa500; }
            100% { box-shadow: 0 min(3.8px, 0.76vw) 0 #b45f2e, 0 0 min(14px, 2.85vw) #ffd700; }
        }
        
        @keyframes pulseBlue {
            0% { box-shadow: 0 min(3.8px, 0.76vw) 0 #b45f2e, 0 0 min(14px, 2.85vw) #87ceeb; }
            50% { box-shadow: 0 min(3.8px, 0.76vw) 0 #b45f2e, 0 0 min(28px, 5.7vw) #87ceeb, 0 0 min(42px, 8.55vw) #4169e1; }
            100% { box-shadow: 0 min(3.8px, 0.76vw) 0 #b45f2e, 0 0 min(14px, 2.85vw) #87ceeb; }
        }
        
        @keyframes pulseRed {
            0% { box-shadow: 0 min(3.8px, 0.76vw) 0 #b45f2e, 0 0 min(14px, 2.85vw) #ff6b6b; }
            50% { box-shadow: 0 min(3.8px, 0.76vw) 0 #b45f2e, 0 0 min(28px, 5.7vw) #ff6b6b, 0 0 min(42px, 8.55vw) #ff0000; }
            100% { box-shadow: 0 min(3.8px, 0.76vw) 0 #b45f2e, 0 0 min(14px, 2.85vw) #ff6b6b; }
        }
        
        .power-emoji {
            font-size: clamp(1.33rem, 4.75vw, 1.52rem);
            line-height: 1;
            z-index: 2;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
        }
        
        .power-progress {
            position: absolute;
            top: -5.7px;
            left: -5.7px;
            width: calc(100% + 11.4px);
            height: calc(100% + 11.4px);
            border-radius: 50%;
            border: min(3.8px, 0.76vw) solid transparent;
            border-top-color: white;
            border-right-color: rgba(255,255,255,0.7);
            border-bottom-color: rgba(255,255,255,0.4);
            border-left-color: rgba(255,255,255,0.2);
            transform: rotate(0deg);
            animation: rotate 2s linear infinite;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .power-progress.active {
            opacity: 1;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        #powerTimerText {
            position: absolute;
            bottom: -19px;
            font-size: clamp(0.76rem, 2.85vw, 0.86rem);
            font-weight: 700;
            background: white;
            padding: min(1.9px, 0.38vw) min(5.7px, 0.95vw);
            border-radius: 30px;
            min-width: min(26.6px, 6.65vw);
            text-align: center;
            border: min(1.9px, 0.38vw) solid #ff9472;
            color: #4d2b13;
            box-shadow: 0 min(1.9px, 0.38vw) 0 #b45f2e;
            z-index: 3;
        }

        .gameover-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background:transparent;
            backdrop-filter: blur(5px);
            border-radius: min(76px, 11.4vw);
            padding: min(28.5px, 4.75vw) min(38px, 5.7vw);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: min(19px, 2.85vw);
            z-index: 200;
            border: min(7.6px, 1.43vw) solid #ff6f42;
            box-shadow: 0 min(19px, 2.85vw) 0 #b15533;
            width: min(266px, 76%);
            text-align: center;
        }
        .gameover-overlay.show {
            display: flex;
        }
        .gameover-text {
            font-size: clamp(2.38rem, 9.5vw, 2.85rem);
            filter: drop-shadow(4px 4px 0 #b15533);
        }
        .gameover-message {
            font-size: clamp(1.43rem, 5.7vw, 1.9rem);
            color: white;
            font-weight: 700;
            background: #ff9472;
            padding: min(9.5px, 1.9vw) min(19px, 2.85vw);
            border-radius: 40px;
            border: min(3.8px, 0.76vw) solid white;
        }
        #playAgainBtn {
            background: #faca15;
            border: none;
            border-radius: 60px;
            padding: min(14px, 2.38vw) min(28.5px, 4.75vw);
            font-size: clamp(1.43rem, 5.7vw, 1.9rem);
            font-weight: 700;
            color: #4d2b13;
            border: min(4.75px, 0.95vw) solid white;
            box-shadow: 0 min(7.6px, 1.43vw) 0 #b47d2e;
            cursor: pointer;
            transition: transform 0.05s ease;
            display: flex;
            align-items: center;
            gap: min(14px, 2.38vw);
        }
        #playAgainBtn:active {
            transform: translateY(min(7.6px, 1.43vw));
            box-shadow: 0 min(1.9px, 0.38vw) 0 #b47d2e;
        }

        /* ===== LEADERBOARD STYLES ===== */
        .leaderboard-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            z-index: 500;
            border-radius: min(47.5px, 7.6vw);
            padding: 20px;
        }
        .leaderboard-overlay.show {
            display: flex;
        }
        .lb-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        .lb-list {
            width: 100%;
            max-width: 350px;
            font-size: 16px;
            line-height: 2.2;
            text-align: left;
        }
        .lb-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 4px 10px;
            border-radius: 30px;
            background: rgba(255,255,255,0.05);
            margin-bottom: 4px;
            transition: background 0.2s;
        }
        .lb-item:hover {
            background: rgba(255,255,255,0.1);
        }
        .lb-rank {
            font-weight: 700;
            color: #94a3b8;
            min-width: 30px;
            text-align: center;
        }
        .lb-rank.gold { color: #ffd700; }
        .lb-rank.silver { color: #c0c0c0; }
        .lb-rank.bronze { color: #cd7f32; }
        
        .lb-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ffd700;
            background: #1a1a2e;
            flex-shrink: 0;
        }
        .lb-avatar.emoji {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border-color: #475569;
        }
        .lb-username {
            flex: 1;
            font-weight: 600;
            color: #e2e8f0;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .lb-score {
            font-weight: 700;
            color: #ffd700;
            font-size: 16px;
        }
        .lb-timer {
            margin-top: 15px;
            font-size: 20px;
            color: #94a3b8;
        }
        .lb-timer span {
            color: #fff;
            font-weight: 700;
            font-size: 24px;
        }

        .shield-notification{
            position:absolute;
            top:170px;
            left:50%;
            transform:translateX(-50%);
            background:none !important;
            padding:0;
            margin:0;
            border:none !important;
            border-radius:0;
            box-shadow:none !important;
            color:#FFD700;
            font-family:Arial,sans-serif;
            font-size:14px;
            font-weight:bold;
            text-shadow:1px 1px 2px #000;
            z-index:400;
            display:none;
            pointer-events:none;
            white-space:nowrap;
        }

        .gift-icon-noti{width:18px;height:18px;object-fit:contain;vertical-align:middle;margin-right:4px;}
        .noti-avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;display:inline-block;vertical-align:middle;margin-right:4px;border:1px solid #fff;}
        .gift-icon{
            width:28px;
            height:28px;
            object-fit:contain;
            vertical-align:middle;
        }

        @media screen and (min-width: 769px) {
            .game-wrapper {
                padding: 10.8px 7.2px 15px;
                border-radius: 48px 48px 30px 30px;
                box-shadow: 0 12px 0 #b85b2a, 0 18px 18px rgba(0,0,0,0.25);
                border: 3.6px solid #ffe9a7;
            }
            
            canvas {
                width: 270px;
                height: 390px;
                max-height: none;
                aspect-ratio: auto;
                border-radius: 30px;
                box-shadow: inset 0 0 0 4.8px #fec37f, 0 7.2px 0 #9f4d26;
            }
            
            .top-bar {
                padding: 6px 14px;
                margin: 0 0 6px 0;
                border-radius: 36px;
                border: 2.4px solid #ffa56e;
                box-shadow: 0 5px 0 #a05028;
                gap: 8px;
            }

            .like-panel {
                padding: 4px 12px;
                border-radius: 30px;
                border: 2px solid #ffad5a;
                min-width: 100px;
                gap: 6px;
            }
            .like-panel .like-label {
                font-size: 0.65rem;
            }
            #likeFillMini {
                height: 8px !important;
                min-width: 80px !important;
                width: 80px !important;
            }

            .timer-box {
                gap: 3px;
                padding: 4px 10px;
                border-radius: 30px;
                border: 2px solid #ff8a5c;
            }
            .timer-box span.timer-icon {
                font-size: 0.7rem;
            }
            #roundTimerDisplay {
                border-radius: 20px;
                padding: 1px 8px;
                min-width: 22px;
                font-size: 0.6rem;
                line-height: 1.3;
            }

            .power-indicator {
                width: 28.8px;
                height: 28.8px;
                min-width: 28.8px;
                min-height: 28.8px;
                border: 2.4px solid white;
                box-shadow: 0 2.4px 0 #b45f2e, 0 0 9px rgba(255, 215, 0, 0.5);
            }
            
            @keyframes pulseGlow {
                0% { box-shadow: 0 2.4px 0 #b45f2e, 0 0 6px rgba(255, 255, 255, 0.5); }
                50% { box-shadow: 0 2.4px 0 #b45f2e, 0 0 12px rgba(255, 215, 0, 0.8); }
                100% { box-shadow: 0 2.4px 0 #b45f2e, 0 0 6px rgba(255, 255, 255, 0.5); }
            }
            
            @keyframes pulseGold {
                0% { box-shadow: 0 2.4px 0 #b45f2e, 0 0 9px #ffd700; }
                50% { box-shadow: 0 2.4px 0 #b45f2e, 0 0 18px #ffd700, 0 0 27px #ffa500; }
                100% { box-shadow: 0 2.4px 0 #b45f2e, 0 0 9px #ffd700; }
            }
            
            @keyframes pulseBlue {
                0% { box-shadow: 0 2.4px 0 #b45f2e, 0 0 9px #87ceeb; }
                50% { box-shadow: 0 2.4px 0 #b45f2e, 0 0 18px #87ceeb, 0 0 27px #4169e1; }
                100% { box-shadow: 0 2.4px 0 #b45f2e, 0 0 9px #87ceeb; }
            }
            
            @keyframes pulseRed {
                0% { box-shadow: 0 2.4px 0 #b45f2e, 0 0 9px #ff6b6b; }
                50% { box-shadow: 0 2.4px 0 #b45f2e, 0 0 18px #ff6b6b, 0 0 27px #ff0000; }
                100% { box-shadow: 0 2.4px 0 #b45f2e, 0 0 9px #ff6b6b; }
            }
            
            .power-emoji {
                font-size: 0.96rem;
            }
            
            .power-progress {
                top: -3.6px;
                left: -3.6px;
                width: calc(100% + 7.2px);
                height: calc(100% + 7.2px);
                border: 2.4px solid transparent;
                border-top-color: white;
                border-right-color: rgba(255,255,255,0.7);
                border-bottom-color: rgba(255,255,255,0.4);
                border-left-color: rgba(255,255,255,0.2);
            }
            
            #powerTimerText {
                bottom: -12px;
                font-size: 0.54rem;
                padding: 1.2px 3.6px;
                border-radius: 30px;
                min-width: 18px;
                border: 1.2px solid #ff9472;
                box-shadow: 0 1.2px 0 #b45f2e;
            }

            .gameover-overlay {
                border-radius: 48px;
                padding: 18px 24px;
                gap: 12px;
                border: 4.8px solid #ff6f42;
                box-shadow: 0 12px 0 #b15533;
                width: 168px;
            }
            .gameover-text {
                font-size: 1.8rem;
            }
            .gameover-message {
                font-size: 1.2rem;
                padding: 6px 12px;
                border: 2.4px solid white;
            }
            #playAgainBtn {
                border-radius: 60px;
                padding: 9px 18px;
                font-size: 1.2rem;
                border: 3px solid white;
                box-shadow: 0 4.8px 0 #b47d2e;
                gap: 9px;
            }
            #playAgainBtn:active {
                transform: translateY(4.8px);
                box-shadow: 0 1.2px 0 #b47d2e;
            }

            .lb-list {
                font-size: 14px;
                max-width: 280px;
            }
            .lb-avatar {
                width: 28px;
                height: 28px;
            }
            .lb-avatar.emoji {
                font-size: 16px;
            }
            .lb-username {
                font-size: 12px;
            }
            .lb-score {
                font-size: 14px;
            }
        }
    
        @media (max-width: 480px) {
            .shield-status-bar {
                font-size: 10px;
                padding: 8px 10px;
            }
            .shield-status-bar .gift-icon {
                width: 20px;
                height: 20px;
            }
            .lb-list {
                font-size: 13px;
            }
            .lb-avatar {
                width: 26px;
                height: 26px;
            }
            .lb-avatar.emoji {
                font-size: 16px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="game-wrapper" id="gameWrapper">
        <div class="shield-status-bar">
            <div style="display:flex;justify-content:center;align-items:center;gap:10px;white-space:nowrap;flex-wrap:wrap;">
                <span>🛡️ Active Shield =</span>
                <img src="assets/gifts/rose.png" class="gift-icon">
                <span>x<span id="roseCountDisplay">1</span> (15s)</span>
                <span>|</span>
                <img src="assets/gifts/donut.png" class="gift-icon">
                <span>x<span id="donutCountDisplay">1</span> (2 Games)</span>
            </div>
            <div style="display:flex;justify-content:center;align-items:center;gap:12px;margin-top:4px;white-space:nowrap;flex-wrap:wrap;">
                <span>🎁 X2 Point =</span>
